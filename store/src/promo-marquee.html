<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="base.css">
<style>
  .canvas { width: 1400px; height: 560px; padding: 0 88px; display: grid; grid-template-columns: 1.15fr 0.85fr; align-items: center; gap: 40px; }
  .brand { font-size: 34px; }
  .brand .rec-dot { width: 25px; height: 25px; }
  .tag { margin-top: 26px; font-size: 66px; font-weight: 780; line-height: 1.04; letter-spacing: -0.035em; max-width: 15ch; }
  .tag .hl { color: var(--rec-bright); }
  .sub { margin-top: 22px; font-size: 22px; color: var(--fg-dim); max-width: 40ch; }
  .pills { margin-top: 34px; }
  .pill { font-size: 16px; padding: 10px 18px; }
  .art { position: relative; height: 100%; }
  .glyph { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); width: 268px; height: 268px; border-radius: 50%; background: radial-gradient(circle at 40% 36%, var(--rec-bright), var(--rec) 60%, #8f1913); box-shadow: 0 0 0 22px rgba(229,52,43,0.06), 0 0 0 46px rgba(229,52,43,0.035), 0 40px 120px -10px rgba(229,52,43,0.5); }
  .ring { position: absolute; right: -2px; top: 50%; transform: translateY(-50%); width: 312px; height: 312px; border-radius: 50%; border: 1px solid rgba(229,52,43,0.3); }
  .ring2 { position: absolute; right: -24px; top: 50%; transform: translateY(-50%); width: 356px; height: 356px; border-radius: 50%; border: 1px solid rgba(229,52,43,0.14); }
</style>
</head>
<body>
<div class="canvas">
  <div class="copy">
    <div class="brand"><span class="rec-dot"></span><span class="wm"><span class="rec">Rec</span>aptain</span></div>
    <div class="tag">Record it once. <span class="hl">Hand off the whole story.</span></div>
    <div class="sub">Clicks, screenshots, console, network, and your voice, in one shareable bundle.</div>
    <div class="pills">
      <span class="pill"><span class="tick">✓</span> 100% Free</span>
      <span class="pill"><span class="tick">✓</span> 100% Local</span>
      <span class="pill"><span class="tick">✓</span> 100% Private</span>
    </div>
  </div>
  <div class="art">
    <div class="ring2"></div>
    <div class="ring"></div>
    <div class="glyph"></div>
  </div>
</div>
</body>
</html>
